<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niipseedadust | Music & Bookings Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #07070a;
            --bg-card: rgba(15, 15, 20, 0.7);
            --bg-card-solid: #0f0f14;
            --accent-purple: #9d4edd;
            --accent-neon: #00f5d4;
            --text-pure: #ffffff;
            --text-muted: #94a3b8;
            --border-glow: rgba(157, 78, 221, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            color: var(--text-pure);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(to right, var(--bg-deep) 0%, rgba(7, 7, 10, 0.7) 30%, rgba(7, 7, 10, 0.2) 50%, rgba(7, 7, 10, 0.7) 75%, var(--bg-deep) 100%),
                linear-gradient(to bottom, rgba(7, 7, 10, 0.8) 0%, rgba(7, 7, 10, 0.1) 20%, rgba(7, 7, 10, 0.1) 80%, var(--bg-deep) 100%),
                url('Niipseedadust 5.jpg');
            background-repeat: no-repeat;
            background-position: center 30%;
            background-size: cover;
            background-attachment: fixed;
        }

        /* Top Bar */
        .analytics-bar {
            background: rgba(20, 1, 38, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 5%;
            font-size: 0.8rem;
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            color: var(--accent-neon);
            font-weight: 600;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1001;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(7, 7, 10, 0.6);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text-pure);
            text-decoration: none;
        }

        .logo span { color: var(--accent-purple); }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover { color: var(--text-pure); }

        /* General Layout */
        section {
            padding: 100px 5% 60px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 3rem;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* Hero Section */
        .hero-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 60px;
            align-items: center;
            min-height: 75vh;
        }

        .hero-text h1 {
            font-family: 'Syne', sans-serif;
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 25px;
        }

        .hero-text p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            max-width: 550px;
            line-height: 1.6;
        }

        /* Buttons */
        .cta-group { display: flex; gap: 20px; }

        .btn {
            padding: 16px 36px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
        }

        .btn-main {
            background-color: var(--accent-purple);
            color: white;
            box-shadow: 0 8px 30px rgba(157, 78, 221, 0.3);
        }

        .btn-main:hover { transform: translateY(-3px); }

        .btn-outline {
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
        }

        /* Player Styling */
        .music-engine {
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .spotify-frame-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            margin-bottom: 30px;
        }

        .track-row {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            align-items: center;
            gap: 20px;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .track-row:hover { background: rgba(255,255,255,0.05); }

        .track-row.active {
            border-left: 4px solid var(--accent-neon);
            background: rgba(157, 78, 221, 0.2);
        }

        /* Forms */
        .input-element {
            width: 100%;
            padding: 16px;
            background: rgba(7, 7, 10, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
        }

        footer {
            padding: 60px 5%;
            text-align: center;
            background: rgba(7, 7, 10, 0.9);
        }

        .social-matrix {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
        }

        .social-matrix a { color: var(--text-muted); font-size: 1.5rem; transition: 0.3s; }
        .social-matrix a:hover { color: var(--accent-purple); }

        @media (max-width: 968px) {
            .hero-container { grid-template-columns: 1fr; }
            .hero-text h1 { font-size: 3.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <div class="analytics-bar">
        <span><i class="fa-solid fa-users"></i> Visits: <span id="view-count-val">0</span></span>
        <span><i class="fa-solid fa-bolt"></i> Global Streams: <span id="global-stream-val">0</span></span>
    </div>

    <nav>
        <a href="#" class="logo">NIIPSEEDADUST<span>.</span></a>
        <div class="nav-links">
            <a href="#about">Roots</a>
            <a href="#music">Discography</a>
            <a href="#contact">Bookings</a>
        </div>
    </nav>

    <section id="home">
        <div class="hero-container">
            <div class="hero-text">
                <h1>NIIPSEEDADUST</h1>
                <p>South African Music Producer & DJ bridging the gap between tribal Afro-tech and global electronic dance floors.</p>
                <div class="cta-group">
                    <a href="#music" class="btn btn-main"><i class="fa-solid fa-headphones"></i> Listen Now</a>
                    <a href="#contact" class="btn btn-outline">Book Artist</a>
                </div>
            </div>
            <div style="text-align: center;">
                <i class="fa-solid fa-compact-disc fa-spin" style="font-size: 10rem; color: var(--accent-purple); --fa-animation-duration: 10s;"></i>
            </div>
        </div>
    </section>

    <section id="music">
        <h2 class="section-title">Discography</h2>
        <div class="music-engine">
            <div class="spotify-frame-wrapper">
                <iframe id="spotify-player-iframe" src="" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen" loading="lazy"></iframe>
            </div>
            <div id="track-list">
                </div>
        </div>
    </section>

    <section id="contact">
        <h2 class="section-title">Bookings</h2>
        <form style="max-width: 600px; margin: 0 auto;" onsubmit="event.preventDefault(); alert('Request Transmitted!');">
            <input type="text" class="input-element" placeholder="Full Name / Agency" required>
            <input type="email" class="input-element" placeholder="Email Address" required>
            <textarea class="input-element" rows="5" placeholder="Event Details (Date, Location, Requirements)" required></textarea>
            <button type="submit" class="btn btn-main" style="width: 100%; justify-content: center;">Send Request</button>
        </form>
    </section>

    <footer>
        <div class="social-matrix">
            <a href="#"><i class="fab fa-spotify"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
        <p>© 2026 Niipseedadust. Durban, South Africa.</p>
    </footer>

    <script>
        const catalog = [
            { id: 0, title: "Asenuru", year: "2026", embed: "https://open.spotify.com/embed/track/123" }, // Replace with real IDs
            { id: 1, title: "Brothers", year: "2026", embed: "https://open.spotify.com/embed/track/456" },
            { id: 2, title: "Bayeza", year: "2026", embed: "https://open.spotify.com/embed/track/789" },
            { id: 3, title: "Utshwala", year: "2025", embed: "https://open.spotify.com/embed/track/012" }
        ];

        function loadAndPlayTrack(id) {
            const track = catalog.find(t => t.id === id);
            document.getElementById('spotify-player-iframe').src = track.embed;
            
            // Update active state in UI
            document.querySelectorAll('.track-row').forEach(row => row.classList.remove('active'));
            document.getElementById(`row-${id}`).classList.add('active');
        }

        // Initialize track list
        const listContainer = document.getElementById('track-list');
        catalog.forEach(track => {
            const row = document.createElement('div');
            row.className = 'track-row';
            row.id = `row-${track.id}`;
            row.onclick = () => loadAndPlayTrack(track.id);
            row.innerHTML = `
                <i class="fab fa-spotify" style="color: #1DB954;"></i>
                <div>
                    <h4 style="font-weight: 600;">${track.title}</h4>
                    <span style="font-size: 0.8rem; color: var(--text-muted);">${track.year} Release</span>
                </div>
                <div style="color: var(--accent-neon); font-size: 0.8rem;">LIVE</div>
            `;
            listContainer.appendChild(row);
        });

        // Initialize first track and counters
        window.onload = () => {
            loadAndPlayTrack(0);
            const visits = (parseInt(localStorage.getItem('v_count')) || 1500) + 1;
            localStorage.setItem('v_count', visits);
            document.getElementById('view-count-val').innerText = visits.toLocaleString();
            document.getElementById('global-stream-val').innerText = (visits * 12).toLocaleString();
        };
    </script>
</body>
</html>
