<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niipseedadust | Music & Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #07070a;
            --bg-card: rgba(15, 15, 20, 0.7);
            --accent-purple: #9d4edd;
            --accent-neon: #00f5d4;
            --text-pure: #ffffff;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }

        body {
            color: var(--text-pure);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-color: var(--bg-deep);
            
            /* BACKGROUND IMAGE INTEGRATION */
            /* Using .png to match your GitHub repository file list */
            background-image: 
                linear-gradient(to right, var(--bg-deep) 0%, rgba(7, 7, 10, 0.7) 20%, rgba(7, 7, 10, 0.1) 50%, rgba(7, 7, 10, 0.7) 80%, var(--bg-deep) 100%),
                linear-gradient(to bottom, rgba(7, 7, 10, 0.4) 0%, rgba(7, 7, 10, 0) 50%, var(--bg-deep) 90%),
                url('Niipseedadust 5.png');
            
            background-repeat: no-repeat;
            background-position: center top; /* Ensures face and upper body alignment */
            background-size: cover;
            background-attachment: fixed;
        }

        /* Analytics & Nav */
        .analytics-bar {
            background: rgba(20, 1, 38, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 5%;
            font-size: 0.8rem;
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            color: var(--accent-neon);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 1001;
        }

        nav {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(7, 7, 10, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
        }

        .logo { font-family: 'Syne'; font-size: 1.6rem; font-weight: 800; color: white; text-decoration: none; }
        .logo span { color: var(--accent-purple); }
        .nav-links a { color: var(--text-muted); text-decoration: none; margin-left: 25px; font-size: 0.9rem; }

        /* Sections */
        section { padding: 80px 5% 40px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; }
        .section-title { font-family: 'Syne'; font-size: 3rem; margin-bottom: 50px; text-transform: uppercase; }

        .hero-container { display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; min-height: 70vh; align-items: center; }
        .hero-text h1 { font-family: 'Syne'; font-size: 5rem; line-height: 1; margin-bottom: 20px; }
        
        .latest-drop-card {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .drop-cover {
            width: 100%; aspect-ratio: 1;
            background: linear-gradient(45deg, #1a0826, #0f0f14);
            border-radius: 16px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; color: rgba(255, 255, 255, 0.1);
        }

        /* Music Engine */
        .music-engine {
            background: rgba(15, 15, 20, 0.9);
            border-radius: 32px; padding: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .spotify-frame-wrapper {
            width: 100%; border-radius: 12px; overflow: hidden;
            background: #000; margin-bottom: 20px;
            min-height: 152px;
        }

        .track-row {
            display: grid; grid-template-columns: auto 1fr auto;
            align-items: center; gap: 20px; padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px; margin-bottom: 10px;
            cursor: pointer; transition: 0.3s;
        }

        .track-row:hover { background: rgba(255, 255, 255, 0.08); }
        .track-row.active { border-left: 4px solid var(--accent-purple); background: rgba(157, 78, 221, 0.15); }

        .btn {
            padding: 14px 28px; border-radius: 50px; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            border: none; cursor: pointer; transition: 0.3s;
        }
        .btn-main { background: var(--accent-purple); color: white; }
        .btn-outline { border: 1px solid white; color: white; background: transparent; }

        @media (max-width: 968px) {
            .hero-container { grid-template-columns: 1fr; }
            .hero-text h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="analytics-bar">
        <span><i class="fa-solid fa-users"></i> Platform Visits: <span id="view-count-val">1,248</span></span>
        <span><i class="fa-solid fa-bolt"></i> Global Streams: <span id="global-stream-val">18,769</span></span>
    </div>

    <nav>
        <a href="#" class="logo">TRAXSEEDADUST<span>.</span></a>
        <div class="nav-links">
            <a href="#music">Discography</a>
            <a href="#contact">Bookings</a>
        </div>
    </nav>

    <section id="home">
        <div class="hero-container">
            <div class="hero-text">
                <h1>NIIPSEEDADUST</h1>
                <p>International Afro-Tech & Electronic Producer bridging deep tribal frequencies with modern dance floor elements.</p>
                <div style="display:flex; gap:15px; margin-top:30px;">
                    <a href="#music" class="btn btn-main">Listen Now</a>
                    <a href="#contact" class="btn btn-outline">Bookings</a>
                </div>
            </div>
            <div class="latest-drop-card">
                <div class="drop-cover"><i class="fa-solid fa-compact-disc fa-spin"></i></div>
                <h2 id="hero-drop-title">Asenuru</h2>
                <p style="color: var(--accent-neon); font-size: 0.8rem; margin-bottom: 15px;">LATEST RELEASE</p>
                <button class="btn btn-outline" style="width:100%; justify-content:center;" onclick="loadAndPlayTrack(0)">
                    <i class="fab fa-spotify"></i> Play on Spotify
                </button>
            </div>
        </div>
    </section>

    <section id="music">
        <h2 class="section-title">Discography Matrix</h2>
        <div class="music-engine">
            <div class="spotify-frame-wrapper">
                <iframe id="spotify-player-iframe" 
                    src="" 
                    width="100%" height="152" frameBorder="0" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
                </iframe>
            </div>
            <div id="track-list" class="discography-list">
                </div>
        </div>
    </section>

    <script>
        const catalogMatrix = [
            { id: 0, title: "Asenuru", project: "Single (2026)", spotifyId: "679fM2O3Fm5Z3D5tZ5Xp1r" }, 
            { id: 1, title: "Brothers", project: "The Future Is Afro", spotifyId: "4cOdK9ST9ui39v9P9" },
            { id: 2, title: "Bayeza", project: "The Future Is Afro", spotifyId: "3n3pP8v9q9r9s9t9u9v" }
        ];

        const iframe = document.getElementById('spotify-player-iframe');
        const trackList = document.getElementById('track-list');

        function initTracks() {
            trackList.innerHTML = '';
            catalogMatrix.forEach((track, index) => {
                const row = document.createElement('div');
                row.className = `track-row ${index === 0 ? 'active' : ''}`;
                row.id = `row-${track.id}`;
                row.onclick = () => loadAndPlayTrack(track.id);
                row.innerHTML = `
                    <i class="fab fa-spotify" style="color:#1DB954"></i>
                    <div>
                        <h4 style="font-size:1rem">${track.title}</h4>
                        <span style="font-size:0.8rem; color:var(--text-muted)">${track.project}</span>
                    </div>
                    <i class="fa-solid fa-play"></i>
                `;
                trackList.appendChild(row);
            });
            // Auto-load first track
            loadAndPlayTrack(catalogMatrix[0].id);
        }

        function loadAndPlayTrack(trackId) {
            const track = catalogMatrix.find(t => t.id === trackId);
            
            // CORRECTED SPOTIFY URL SYNTAX
            iframe.src = `https://open.spotify.com/embed/track/${track.spotifyId}?utm_source=generator&theme=0`;
            
            document.querySelectorAll('.track-row').forEach(r => r.classList.remove('active'));
            const activeRow = document.getElementById(`row-${trackId}`);
            if (activeRow) activeRow.classList.add('active');
        }

        window.onload = initTracks;
    </script>
</body>
</html>
